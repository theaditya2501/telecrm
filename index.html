<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family:'Plus Jakarta Sans',sans-serif; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md mx-4">
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="bg-indigo-600 p-3 rounded-2xl text-white font-black text-lg shadow-lg shadow-indigo-200">CRM</div>
            <h1 class="text-2xl font-black text-slate-800">Access Portal</h1>
        </div>

        <div id="error-msg" class="hidden bg-rose-50 border border-rose-200 text-rose-600 text-sm font-bold px-4 py-3 rounded-2xl mb-5 flex items-center gap-2">
            <i class="fas fa-exclamation-circle shrink-0"></i>
            <span id="error-text">Invalid credentials.</span>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" id="username" placeholder="Username"
                    class="w-full pl-11 pr-4 py-4 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 font-bold transition-all"
                    onkeydown="if(event.key==='Enter') handleLogin()" autocomplete="username">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="password" id="password" placeholder="Password"
                    class="w-full pl-11 pr-4 py-4 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 font-bold transition-all"
                    onkeydown="if(event.key==='Enter') handleLogin()" autocomplete="current-password">
            </div>
            <button onclick="handleLogin()" id="login-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>
    </div>

    <script>
    localStorage.clear(); // clear any stale session

    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('login-btn');
        const errDiv   = document.getElementById('error-msg');
        const errText  = document.getElementById('error-text');

        errDiv.classList.add('hidden');

        if (!username || !password) {
            errText.innerText = "Please enter both username and password.";
            errDiv.classList.remove('hidden'); return;
        }

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        btn.disabled  = true;

        try {
            const res  = await fetch('/api/login',{
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();

            if (data.status === 'success') {
                localStorage.setItem('crm_user', data.username);
                localStorage.setItem('crm_role', data.role);
                const routes = {
                    telecaller:  '/telecaller',
                    researcher:  '/researcher',
                    admin:       '/admin',
                    super_admin: '/superadmin'
                };
                window.location.href = routes[data.role] || '/';
            } else {
                errText.innerText = data.error || "Login failed.";
                errDiv.classList.remove('hidden');
            }
        } catch(e) {
            errText.innerText = "Server unreachable. Please try again.";
            errDiv.classList.remove('hidden');
        }

        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        btn.disabled  = false;
    }
    </script>
</body>
</html>
